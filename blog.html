<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Journal | Aniko Vigh</title>

  <link rel="stylesheet" href="blog.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="logo">Aniko</a>
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="blog.html" class="active">Blog</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <!-- Blog Hero -->
  <section class="blog-hero">
    <h1 class="heading">My <span>Digital Journal</span></h1>
    <p class="subtitle">Stories, insights, and reflections from my journey through code and creativity.</p>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search posts...">
    </div>

    <div class="tag-filter">
      <button class="tag-btn active" data-tag="all">All</button>
      <button class="tag-btn" data-tag="WebDev">#WebDev</button>
      <button class="tag-btn" data-tag="DataScience">#DataScience</button>
      <button class="tag-btn" data-tag="UIUX">#UIUX</button>
      <button class="tag-btn" data-tag="PersonalGrowth">#PersonalGrowth</button>
    </div>
  </section>

  <!-- Blog Grid -->
  <section class="blog-grid" id="blogContainer"></section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-text">
      <p>© 2026 Aniko Vigh. All rights reserved.</p>
    </div>
    <div class="footer-iconTop">
      <a href="#"><i class="bx bx-up-arrow-alt"></i></a>
    </div>
  </footer>

  <script src="blog.js"></script>
</body>
</html>
