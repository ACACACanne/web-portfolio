<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniko Vigh Portfolio</title>
    <link rel="stylesheet" href="portfolio.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <a href="index.html" class="logo">Portfolio</a>
      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="portfolio.html" class="active">Portfolio</a>

        <a href="index.html#contact">Contact</a>
      </nav>
    </header>

    <!-- Category Selector -->
    <section class="portfolio-selector">
      <h2 class="heading">Explore My Work</h2>

      <div class="category-tabs">
        <button class="tab-btn active" data-category="web">Web Development</button>
        <button class="tab-btn" data-category="data">Data Projects</button>
        <button class="tab-btn" data-category="genAI">Generative AI</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search projects..." />
      </div>
    </section>

    <!-- Dynamic Project Grid -->
    <section class="project-section">
      <div id="project-container" class="project-grid"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-text">
        <p>© 2026 Aniko Vigh. All rights reserved.</p>
      </div>
      <div class="footer-iconTop">
        <a href="#"><i class="bx bx-up-arrow-alt"></i></a>
      </div>
    </footer>
    <!--  Scroll reveal-->
    <script src="https://unpkg.com/scrollreveal"></script>

    <!--typed js-->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

    <script src="index.js"></script>
    <script src="portfolio.js"></script>
    <script src="animations.js"></script>
  </body>
</html>
