<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aniko Vigh Portfolio</title>
  <link rel="stylesheet" href="portfolio.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

<body>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="logo">Portfolio</a>
    <nav class="navbar">
      <a href="index.html">Home</a>

      <a href="blog.html">Blog</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <!-- Category Selector -->
  <section class="portfolio-selector">
    <h2 class="heading">Explore My Work</h2>

    <div class="category-tabs">
      <button class="tab-btn active" data-category="web">Web Development</button>
      <button class="tab-btn" data-category="data">Data Projects</button>
    </div>
  </section>

  <section class="project-section">

  </section>

  <section class="featured">
    <h2 class="heading">Featured <span>Projects</span></h2>

    <div class="banner">
      <div class="slider" style="--quantity: 10;">

        <div class="item" style="--position: 1">
          <img src="assets/pictures/portfolio1.jpg">
        </div>

        <div class="item" style="--position: 2">
          <img src="assets/pictures/portfolio2.jpg">
        </div>

        <div class="item" style="--position: 3">
          <img src="assets/pictures/portfolio3.jpg">
        </div>

        <div class="item" style="--position: 4">
          <img src="assets/pictures/portfolio4.jpg">
        </div>

        <div class="item" style="--position: 5">
          <img src="assets/pictures/portfolio5.jpg">
        </div>

        <div class="item" style="--position: 6">
          <img src="assets/pictures/portfolio6.jpg">
        </div>

        <div class="item" style="--position: 7">
          <img src="assets/pictures/portfolio2.jpg">
        </div>

        <div class="item" style="--position: 8">
          <img src="assets/pictures/portfolio3.jpg">
        </div>

        <div class="item" style="--position: 9">
          <img src="assets/pictures/portfolio1.jpg">
        </div>

        <div class="item" style="--position: 10">
          <img src="assets/pictures/portfolio10.jpg">
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-text">
      <p>© 2026 Aniko Vigh. All rights reserved.</p>
    </div>
    <div class="footer-iconTop">
      <a href="#"><i class="bx bx-up-arrow-alt"></i></a>
    </div>
  </footer>
   <!--  Scroll reveal-->
    <script src="https://unpkg.com/scrollreveal"></script>
    
    <!--typed js-->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
